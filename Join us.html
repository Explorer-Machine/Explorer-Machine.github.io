<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Join us-Explorer</title>
        <link type="text/css" rel="stylesheet" href="css/general.css">
        <link type="text/css" rel="stylesheet" href="css/Join us-1.css">
    </head>

    <body>
        <div class="header">
            <div class="header-logo special1">
                <a href="index.html"><img src="img/Logos/Explorer.png" alt="logo"></a>
            </div>
            <div class="header-navigationbar special1">
                <ul>
                    <li><a href="index.html">主页</a></li>
                    <li><a href="Gallery.html">画廊</a></li>
                    <li><a href="About.html">关于</a></li>
                    <li><a href="Join us.html" class="except1">加入我们</a></li>
                </ul>
            </div>
        </div>
        <div calss="main">
            <form class="mainform1" action="Server.html">
                姓名<br>
                <input type="text" name="name" placeholder="真实姓名" class="list">
                <br><br>
                性别<br>
                男<input type="radio" name="sex" class="except2">女<input type="radio" name="sex" class="except2">
                <br><br>
                生日<br>
                <input type="date" name="brithday-date" class="list">
                <br><br>
                用户名<br>
                <input type="text" name="username" placeholder="长度3-18位，仅包含中文、英文大小写" class="list" size="3" maxlength="18">
                <br><br>
                账号<br>
                <input type="text" name="user-account" placeholder="0101" class="list" readonly>
                <br><br>
                密码<br>
                <input type="password" name="password" placeholder="密码" class="list">
                <br><br>
                确认密码<br>
                <input type="password" name="confirm-password" placeholder="确认密码" class="list">
                <br><br>
                F码<br>
                <input type="text" name="F-code" class="list" placeholder="">
                <br><br>
                Email<br>
                <input type="email" name="email" class="list">
                <br><br>
                移动电话<br>
                <input type="tel" name="tel-number" class="list" placeholder="11位手机号" maxlength="11">
                <br><br><br><br>
                <input type="textarea" name="suggestion" placeholder="对我们的建议..." rows="10" class="suggestion" wrap="physical">
                <br><br>
                <input type="checkbox" name="agreement-check" selected>我已详细阅读并同意<a class="user-agreement" href="https://www.apmex.com/useragreement">《用户手册》</a><input type="reset" value="重新填写" class="reset">
                <br><br><br><br>
                <input type="submit" value="加入我们" class="submit">
            </form>
        </div>
    </body>
</html>
